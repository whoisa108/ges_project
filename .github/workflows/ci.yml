name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        working-directory: backend
        run: ./mvnw clean verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Check Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  fortify-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Fortify Scan
        uses: fortify/github-action@v1
        with:
          sast-scan: true
        env:
          SC_CONTROLLER_URL: ${{ secrets.FORTIFY_SC_URL }}
          SC_CLIENT_AUTH_TOKEN: ${{ secrets.FORTIFY_SC_CLIENT_AUTH_TOKEN }}
          SSC_URL: ${{ secrets.FORTIFY_SSC_URL }}
          SSC_TOKEN: ${{ secrets.FORTIFY_SSC_TOKEN }}
          SSC_APPVERSION: ESG-Project:1.0
          PACKAGE_EXTRA_OPTS: -bt mvn -bf backend/pom.xml
